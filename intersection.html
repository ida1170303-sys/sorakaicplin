    <h1>交集</h1>
    <div class="meta">2010/6/9 下午 11:26:20</div>

    <div class="poem">
在離去之前 注視

四目交接的瞬間 輕顫的眼睫

究竟

過去 已是幾遍輪迴

未來 是否相約錯失

就忘記吧 曾經天涯

各自 孤獨老去
