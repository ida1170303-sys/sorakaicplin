<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>Inner Landscapes | Sora Kai</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Helvetica Neue", sans-serif;
      background: radial-gradient(circle at top, #102038 0%, #060b14 50%, #000000 100%);
      color: #ffffff;
    }

    .page {
      max-width: 880px;
      margin: 0 auto;
      padding: 48px 24px 100px;
    }

    .back {
      display: inline-block;
      color: #bfc7d2;
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 1px;
      margin-bottom: 40px;
      transition: color 0.3s ease;
    }

    .back:hover {
      color: #ffffff;
    }

    h1 {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 4px;
      margin: 0 0 20px;
    }

    .intro {
      max-width: 620px;
      font-size: 0.96rem;
      line-height: 1.9;
      color: #cfd6df;
      margin-bottom: 52px;
    }

    .gallery {
      display: flex;
      flex-direction: column;
      gap: 36px;
    }

    .gallery img {
      width: 100%;
      display: block;
      border-radius: 4px;
    }

    .footer {
      margin-top: 70px;
      text-align: center;
      font-size: 0.82rem;
      color: #7f8996;
      letter-spacing: 1px;
    }

    @media (max-width: 640px) {
      .page {
        padding: 36px 18px 72px;
      }

      h1 {
        font-size: 1.6rem;
        letter-spacing: 3px;
      }

      .intro {
        font-size: 0.92rem;
        line-height: 1.8;
        margin-bottom: 40px;
      }

      .gallery {
        gap: 24px;
      }
    }
  </style>
</head>

<body>
  <div class="page">

    <a href="index.html" class="back">← Back</a>

    <h1>INNER LANDSCAPES</h1>

    <div class="intro">
      These works move closer to inner perception —
      fragments of feeling, quiet states, and unseen landscapes.
      <br><br>
      They do not always tell a clear story,
      but remain as traces of attention, gaze, and presence.
    </div>

    <div class="gallery">
      <!-- 觀看的開始 -->
      <img src="violetgaze.jpg" alt="Violet Gaze">

      <!-- 被觀看 -->
      <img src="eyes.jpg" alt="Eyes">

      <!-- 結構 -->
      <img src="zentangle.jpg" alt="Zentangle">

      <!-- 靜止 -->
      <img src="still-life.jpg" alt="Still Life">

      <!-- 新增：內在結構 -->
      <img src="yellow-eyes.jpg" alt="Yellow Eyes">

      <!-- 新增：更深層觀看 -->
      <img src="triangle.jpg" alt="Triangle Eyes">
    </div>

    <div class="footer">
      Sora Kai
    </div>

  </div>
</body>
</html>
