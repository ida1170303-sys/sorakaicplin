      <div class="meta">2008 / 12 / 30</div>
    </header>

    <div class="poem">
聽到名字的時候  
心中有種不祥  

但  
為何當下竟沒有太大的震撼  

好多年沒見了  

這些年來  
只偶然聽到些許消息  

記憶中的小女孩  
據說已經研究所畢業  
長得漂亮身材又好  

嗯  
似乎可以想像得到  

美麗聰明的母親  
與俊挺的高材生父親的結晶  

從異國回來時  
像個洋娃娃  

小女孩是多麼地令人注目  

這麼多年了  
竟然沒再見過  

怎  

大人世界恩怨太過難解  

多久前才憶起  
幼時被嚴格教養的模樣  

怎  

就這麼走了  

這些年  
怎麼過的  

四樓有多高  

怎就這麼捨得  

為生存過的每個年頭  
折上蓮花  

不要回頭  

一路好走
    </div>
