  <div class="container">
    <h1>雛菊</h1>

    <div class="poem">
我以為 我是

那善於等待的

雛菊


第一眼 就記起

那是多少世的熟悉

而漂泊的你

總是 離去

留我在長夜裡嘆息

嚶嚶哭泣


我正是 

那善於等待的

雛菊


在你望見之前

已經

羞怯地開放 又

靜默地凋萎


錯過了 我們

又是千萬年
    </div>
