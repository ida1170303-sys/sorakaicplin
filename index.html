<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>Sora Kai</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at 30% 20%, rgba(60, 90, 160, 0.25), transparent 40%),
                  radial-gradient(circle at 70% 30%, rgba(120, 70, 180, 0.2), transparent 45%),
                  radial-gradient(circle at 50% 80%, rgba(40, 120, 140, 0.2), transparent 50%),
                  linear-gradient(180deg, #05070d 0%, #02040a 100%);
      color: #ffffff;
      font-family: "Helvetica Neue", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }

    /* 柔光層（空氣感） */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, rgba(255,255,255,0.03), transparent 60%);
      pointer-events: none;
    }

    /* 滑鼠流動光（像風） */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(120,160,255,0.05), transparent 40%);
      pointer-events: none;
      transition: background 0.2s ease;
    }

    .container {
      max-width: 620px;
      padding: 40px 24px;
    }

    h1 {
      font-size: 2.8rem;
      letter-spacing: 4px;
      margin: 0 0 42px 0;
      font-weight: 300;
    }

    .tagline-main {
      font-size: 1.2rem;
      line-height: 1.8;
      letter-spacing: 0.5px;
      opacity: 0.95;
      margin-bottom: 28px;
      font-weight: 300;
    }

    .tagline-sub {
      font-size: 1rem;
      line-height: 2;
      opacity: 0.72;
      margin-bottom: 60px;
      font-weight: 300;
    }

    .nav a {
      display: block;
      margin: 16px 0;
      color: #cccccc;
      text-decoration: none;
      font-size: 0.95rem;
      letter-spacing: 3px;
      transition: color 0.3s ease, transform 0.3s ease;
    }

    .nav a:hover {
      color: #ffffff;
      transform: translateY(-2px);
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 2.3rem;
        letter-spacing: 3px;
      }

      .tagline-main {
        font-size: 1.05rem;
      }

      .tagline-sub {
        font-size: 0.95rem;
        line-height: 1.9;
      }

      .nav a {
        font-size: 0.9rem;
        letter-spacing: 2.5px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>SORA KAI</h1>

    <div class="tagline-main">
      I am learning to be here.
    </div>

    <div class="tagline-sub">
      I paint the wind,<br>
      the light,<br>
      and the moments that stay<br>
      longer than they should.
    </div>

    <div class="nav">
      <a href="inner-landscapes.html">INNER LANDSCAPES</a>
      <a href="illustrations.html">ILLUSTRATIONS</a>
      <a href="writing.html">WRITING</a>
      <a href="about.html">ABOUT</a>
    </div>
  </div>

  <!-- 滑鼠追蹤（風的流動） -->
  <script>
    document.addEventListener("mousemove", (e) => {
      const x = (e.clientX / window.innerWidth) * 100 + "%";
      const y = (e.clientY / window.innerHeight) * 100 + "%";

      document.body.style.setProperty("--x", x);
      document.body.style.setProperty("--y", y);
    });
  </script>

</body>
</html>
