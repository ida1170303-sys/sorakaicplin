    <h1>美麗的都鐸屋外</h1>
    <div class="meta">2010/11/29</div>

    <div class="poem">
公車換了路線

那華美洋樓前

繁花中人群外 赫見

剎時 心裡的毛衣脫了線


低眉垂眼  不想念

咖啡香氣  不想念

刪去又加入  不想念

終無法分類  不想念
