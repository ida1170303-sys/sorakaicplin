    <h1>在久別之後</h1>
    <div class="meta"></div>

    <div class="poem">
在久別之後

你來了 陪我

在生命的邊緣漫舞
 

無數個夜晚的話語

是令人寂寞的秘密
 

期盼 成了緩慢的絕望

思念 剩下深沉的耽溺
 

就不要再追究了吧

我們之中

是誰 先

屈服於現實
 

在我們厭倦之前

在雲淡風輕之前

我先原諒你
 

逃離

其實 我也就要忘了你
    </div>
