    <h1>鄉遠焚心</h1>
    <div class="meta">2006/9/23 下午 05:03:20</div>

    <div class="content">
      <p>泡溫泉的地方還附設著餐廳和投幣式的卡拉OK機器。</p>

      <p>泡完溫泉的歐巴桑，臉蛋紅紅，精神抖擻地歡唱了起來。</p>

      <p>點唱的本子從頭翻到尾。許多完全陌生的歌，許多看歌名好像曾經會唱，卻一點兒也想不起來如何起音的歌……</p>

      <p>啊……黃瑞文。</p>

      <p>好久不見的名字。不曉得還有多少人記得他呢。</p>

      <p>來自聲音故鄉的男孩。百步蛇的後代……</p>

      <p>懷念他純淨的聲音。</p>

      <p>曾經，這首歌，也撫慰了我異鄉漂泊的靈魂。</p>
    </div>

    <div class="song-note">

      <p class="song-quote">「我曾以為鄉愁是一種浪漫」</p>
