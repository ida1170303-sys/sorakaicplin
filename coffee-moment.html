    <h1>幸福咖啡時光</h1>
    <div class="meta">2010/5/12 下午 11:52:27</div>

    <div class="poem">
可不可以

不要再相遇

不要再別離


深深地望你眼眸

輕輕地你微笑著

啜一口咖啡


靜默如涼水

空氣裡有香味


可不可以

時鐘走它的

時光留在我身邊....
