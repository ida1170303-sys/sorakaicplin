      <h1>但願老天有眼</h1>
      <div class="meta">2008 / 12 / 25</div>
    </header>

    <div class="poem">
總以為  
人在做  
天在看  

耶誕夜  
和Ｋ一起度過  

「笨死了！  
你什麼身份哪？  
那些人踩死你  
是不痛不癢的！  

笨蛋！  

妳有時間生氣  
還不如自己找快樂！」  

而笨蛋如我  
笨笨地想起多年前發的願……  

想起一句老話  
人生如戲，好好演戲  

總以為  
努力地扮演好自己的角色  
就夠了  

只是  

是誰在派誰角色？  

原來  
不要臉的人最會演  
沒有羞恥心的人最會演  

咱  
扮個蹩腳的  

拿著被塗塗改改的劇本  
莫名其妙  
荒腔走調  

何時中場休息啊  

還是  
該落幕了
    </div>
