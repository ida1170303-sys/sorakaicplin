<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>Illustrations | Sora Kai</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #000;
      color: #eee;
      font-family: "Helvetica Neue", sans-serif;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 20px 120px;
    }

    .back {
      color: #aaa;
      text-decoration: none;
      font-size: 0.9rem;
      transition: 0.3s;
    }

    .back:hover {
      color: #fff;
      transform: translateX(-4px);
    }

    h1 {
      font-weight: 300;
      letter-spacing: 3px;
      margin-top: 40px;
      margin-bottom: 20px;
    }

    .intro {
      color: #888;
      line-height: 1.8;
      margin-bottom: 80px;
      max-width: 500px;
    }

    .project {
      margin-bottom: 120px;
      transition: 0.4s;
    }

    .project:hover {
      transform: translateY(-6px);
    }

    .project-title {
      font-size: 1.2rem;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .project-desc {
      color: #aaa;
      font-size: 0.95rem;
      margin-bottom: 20px;
    }

    img {
      width: 85%;
      display: block;
      margin: 0 auto;
    }

  </style>
</head>

<body>

  <div class="page">

    <a href="world.html" class="back">← Back</a>

    <h1>Illustrations</h1>

    <div class="intro">
      Stories that try to stay.<br>
      Small worlds that carry light.
    </div>

    <!-- 台灣 -->
    <div class="project">
      <div class="project-title">Taiwan Landscapes</div>
      <div class="project-desc">Wind, mountains, and quiet mornings.</div>
      <img src="taiwan.jpg">
    </div>

    <!-- 胡桃鉗 -->
    <div class="project">
      <div class="project-title">Nutcracker in Nürnberg</div>
      <div class="project-desc">A story walking through a city of memory.</div>
      <img src="nutcracker.jpg">
    </div>

    <!-- 小禾 -->
    <div class="project">
      <div class="project-title">The Seed of Wind</div>
      <div class="project-desc">A child, a window, and something invisible.</div>
      <img src="seed.jpg">
    </div>

  </div>

</body>
</html>
