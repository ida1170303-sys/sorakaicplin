  <div class="container">
    <h1>夏日的惆悵</h1>

    <div class="poem">
想起這生中惆悵的事

在夏日

想起這生中惆悵的事

蔚藍天空中的雲
就灰暗了下來

舞落的木棉
於是
重擊地面

呼吸
則如飛絮般
消逸
    </div>
