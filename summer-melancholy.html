<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>夏日的惆悵 | Sora Kai</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Helvetica Neue", "Noto Sans TC", sans-serif;
      background: radial-gradient(circle at top, #102038 0%, #060b14 48%, #000000 100%);
      color: #f5f5f5;
      letter-spacing: 0.04em;
      min-height: 100vh;
    }

    .page {
      max-width: 760px;
      margin: 0 auto;
      padding: 60px 24px 100px;
    }

    .back {
      display: inline-block;
      color: #bfc7d2;
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 40px;
      transition: color 0.25s ease;
    }

    .back:hover {
      color: #ffffff;
    }

    .article-header {
      margin-bottom: 56px;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 300;
      letter-spacing: 2px;
      margin: 0 0 12px 0;
    }

    .content {
      font-size: 1.08rem;
      line-height: 2;
      color: #f3f3f3;
    }

    .content p {
      margin: 0 0 1.6em 0;
    }

    .content p:last-child {
      margin-bottom: 0;
    }

    @media (max-width: 640px) {
      .page {
        padding: 48px 20px 80px;
      }

      h1 {
        font-size: 1.55rem;

<body>
  <div class="page">
    <a href="writing.html" class="back">← Back to Writing</a>

    <header class="article-header">
      <h1>夏日的惆悵</h1>
    </header>

    <div class="content">
      <p>想起這生中惆悵的事</p>

      <p>在夏日</p>

      <p>想起這生中惆悵的事</p>

      <p>
        蔚藍天空中的雲<br>
        就灰暗了下來
      </p>

      <p>
        舞落的木棉<br>
        於是<br>
        重擊地面
      </p>

      <p>
        呼吸<br>
        則如飛絮般<br>
        消逸
      </p>
    </div>
  </div>
