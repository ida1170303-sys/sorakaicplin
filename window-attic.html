      <div class="meta">2010 / 1 / 19</div>
    </header>

    <div class="poem">
在唸書的大學城裡
搬過好多次家

也曾經住過閣樓

那時候
因為寫論文
搬到一處老街上的民宅

頂樓的房間
其實是閣樓

斜了一半的空間
只有一扇小小的窗

剛開始
覺得蠻有意思

住久了
卻有一種
少了一半什麼的缺憾

常常發呆
望著對面
低一層樓的窗

裡面住了一位
拉大提琴的男孩

那一年

真的非常苦悶


想起一首黃舒駿的歌

窗

在心靈的邊緣
    </div>
