<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>World | Sora Kai</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Helvetica Neue", sans-serif;
      background: radial-gradient(circle at top, #102038 0%, #060b14 45%, #000000 100%);
      color: #f5f5f5;
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      max-width: 920px;
      margin: 0 auto;
      padding: 48px 28px 100px;
    }

    .back {
      display: inline-block;
      color: #bfc7d2;
      font-size: 0.95rem;
      letter-spacing: 1px;
      margin-bottom: 50px;
      transition: 0.3s ease;
    }

    .back:hover {
      color: #ffffff;
      transform: translateX(-4px);
    }

    .page-title {
      font-size: 2.2rem;
      font-weight: 300;
      letter-spacing: 4px;
      margin: 0 0 18px 0;
    }

    .intro {
      color: #aeb6c2;
      font-size: 1rem;
      line-height: 1.8;
      max-width: 560px;
      margin-bottom: 70px;
    }

    .world-list {
      display: flex;
      flex-direction: column;
      gap: 34px;
    }

    .world-item {
      display: block;
      color: inherit;
      padding: 26px 0;
      border-top: 1px solid rgba(255,255,255,0.08);
      transition: 0.35s ease;
    }

    .world-item:hover {
      transform: translateX(8px);
    }

    .world-item h2 {
      margin: 0 0 12px 0;
      font-size: 1.9rem;
      font-weight: 600;
      letter-spacing: 2px;
      color: #ffffff;
    }

    .world-item p {
      margin: 0 0 16px 0;
      color: #b3bac4;
      font-size: 1rem;
      line-height: 1.8;
    }

    .open {
      color: #d9dee7;
      font-size: 0.95rem;
      letter-spacing: 1px;
      opacity: 0.9;
      transition: 0.3s ease;
    }

    .world-item:hover .open {
      color: #ffffff;
      letter-spacing: 2px;
    }

    @media (max-width: 640px) {
      .page {
        padding: 36px 20px 80px;
      }

      .page-title {
        font-size: 1.8rem;
      }

      .world-item h2 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <a href="index.html" class="back">← Back</a>

    <h1 class="page-title">WORLD</h1>
    <div class="intro">
      Three paths into the inner landscapes, stories, and fragments of Sora Kai.
    </div>

    <div class="world-list">
      <a class="world-item" href="paintings.html">
        <h2>Inner Landscapes</h2>
        <p>Fragments of light, breath, and something that cannot be named.</p>
        <div class="open">Open →</div>
      </a>

      <a class="world-item" href="illustrations.html">
        <h2>Illustrations</h2>
        <p>Stories that try to stay.</p>
        <div class="open">Open →</div>
      </a>

      <a class="world-item" href="writing.html">
        <h2>Fragments</h2>
        <p>What appears before meaning.</p>
        <div class="open">Open →</div>
      </a>
    </div>
  </div>
</body>
</html>
