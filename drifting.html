    <h1>漂泊</h1>
    <div class="meta">2010/2/2 上午 10:00:47</div>

    <div class="content">
      <p>搬家……記不得到底是第幾次搬家了。</p>

      <p>大學時代同住修院宿舍的好友，給了我她那八德路上房子的備份鑰匙。</p>

      <p>她說，她是我的 backup，隨時可以過去住。</p>

      <p>感動之餘，也猶豫著。</p>

      <p>這些年兩人生活歷練大不相同。</p>

      <p>毅然離開兩個孩子的她，和始終飄泊的我……</p>

      <p>是否還能重溫修院時代睡前談心的時光？</p>

      <p>整理不完的東西裡，翻到了大三同遊蘭嶼的相片。</p>

      <p>透藍天空下，海風吹亂我們年輕的髮。</p>

      <p>那時的眼神，多麼清澈……</p>
